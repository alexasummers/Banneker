<!DOCTYPE html>
<html>
<head>
  <title>Jumping Frog</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #eaffea;
    }

    #pond {
      width: 400px;
      height: 200px;
      border: 3px solid black;
      margin: 20px auto;
      position: relative;
      background: lightblue;
    }

    #frog {
      width: 50px;
      height: 50px;
      background: green;
      border-radius: 50%;
      position: absolute;
      bottom: 10px;
      left: 0;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>🐸 Jumping Frog</h2>

Difficulty:
<select id="difficulty">
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard">Hard</option>
</select>

<p>Score: <span id="score">0</span></p>

<div id="pond">
  <div id="frog"></div>
</div>

<script>
  const frog = document.getElementById("frog");
  const scoreDisplay = document.getElementById("score");
  let score = 0;
  let position = 0;

  function moveFrog() {
    let speed = 2;
    if (difficulty.value === "medium") speed = 4;
    if (difficulty.value === "hard") speed = 6;

    position += speed;
    frog.style.left = position + "px";

    if (position > 350) {
      position = 0;
    }
  }

  frog.onclick = () => {
    score++;
    scoreDisplay.textContent = score;
    position = 0;
  };

  setInterval(moveFrog, 30);
</script>

</body>
</html>
