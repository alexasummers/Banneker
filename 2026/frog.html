<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frog Jump!</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #eaffea;
  }

  #game {
    width: 500px;
    height: 250px;
    border: 3px solid black;
    margin: 20px auto;
    position: relative;
    background: lightblue;
    overflow: hidden;
  }

  #frog {
    width: 50px;
    height: 50px;
    background: green;
    border-radius: 50%;
    position: absolute;
    bottom: 20px;
    left: 80px;
    cursor: pointer;
  }

  .log {
    width: 60px;
    height: 30px;
    background: saddlebrown;
    position: absolute;
    bottom: 20px;
    border-radius: 10px;
  }
</style>
</head>
