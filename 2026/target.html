<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Click the Target!</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f2f2f2;
  }

  #game {
    width: 400px;
    height: 300px;
    border: 3px solid black;
    margin: 20px auto;
    position: relative;
    background: white;
  }

  .target {
    position: absolute;
    background: red;
    border-radius: 50%;
    cursor: pointer;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: none;
    background: rgba(0,0,0,0.6);
    color: white;
    font-size: 26px;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>

<h2>🎯 Click the Target!</h2>

Difficulty:
<select id="difficulty">
  <option value="easy">Easy</option>
  <option value="medium" selected>Medium</option>
  <option value="hard">Hard</option>
</select>

<p>
Score: <span id="score">0</span> |
Time: <span id="time">15</span>
</p>

<div id="game">
  <div id="overlay">Time’s Up!</div>
</div>

<script>
const game = document.getElementById("game");
const scoreSpan = document.getElementById("score");
const timeSpan = document.getElementById("time");
const overlay = document.getElementById("overlay");
const difficultySelect = document.getElementById("difficulty");

let score = 0;
let timeLeft = 15;
let playing = true;

/* ----- DIFFICULTY LOGIC ----- */
function getSettings() {
  if (difficultySelect.value === "easy") {
    return { size: 80, life: 1500, spawn: 1200 };
  }
  if (difficultySelect.value === "hard") {
    return { size: 35, life: 500, spawn: 500 };
  }
  return { size: 50, life: 900, spawn: 800 };
}

/* ----- TARGET SPAWN ----- */
function spawnTarget() {
  if (!playing) return;

  const settings = getSettings();
  const t = document.createElement("div");
  t.className = "target";

  t.style.width = settings.size + "px";
  t.style.height = settings.size + "px";
  t.style.left = Math.random() * (400 - settings.size) + "px";
  t.style.top = Math.random() * (300 - settings.size) + "px";

  t.onclick = () => {
    score++;
    scoreSpan.textContent = score;
    t.remove();
  };

  game.appendChild(t);
  setTimeout(() => t.remove(), settings.life);
}

let spawnLoop = setInterval(spawnTarget, 800);

/* ----- UPDATE SPAWN RATE LIVE ----- */
difficultySelect.onchange = () => {
  clearInterval(spawnLoop);
  spawnLoop = setInterval(spawnTarget, getSettings().spawn);
};

/* ----- TIMER ----- */
setInterval(() => {
  timeLeft--;
  timeSpan.textContent = timeLeft;

  if (timeLeft <= 0) {
    playing = false;
    overlay.style.display = "flex";
  }
}, 1000);
</script>

</body>
</html>
``
