<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Click the Target!</title>

<style>
  body { font-family: Arial; text-align: center; background:#f0f0f0; }
  #game {
    width:400px; height:300px;
    border:3px solid black;
    margin:20px auto;
    position:relative;
    background:white;
  }
  .target {
    width:50px; height:50px;
    background:red;
    border-radius:50%;
    position:absolute;
    cursor:pointer;
  }
  #overlay {
    position:absolute; inset:0;
    background:rgba(0,0,0,.6);
    color:white;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:26px;
  }
</style>
</head>
<body>

<h2>🎯 Click the Target!</h2>

<p>Score: <span id="score">0</span> | Time: <span id="time">15</span></p>

<div id="game">
  <div id="overlay">Time’s Up!</div>
</div>

<script>
const game=document.getElementById("game");
const scoreSpan=document.getElementById("score");
const timeSpan=document.getElementById("time");
const overlay=document.getElementById("overlay");

let score=0,timeLeft=15,playing=true;

function target(){
  if(!playing) return;

  const t=document.createElement("div");
  t.className="target";
  t.style.left=Math.random()*350+"px";
  t.style.top=Math.random()*250+"px";

  t.onclick=()=>{
    score++;
    scoreSpan.textContent=score;
    t.remove();
  };

  game.appendChild(t);
  setTimeout(()=>t.remove(),1000);
}

setInterval(target,800);

setInterval(()=>{
  timeLeft--;
  timeSpan.textContent=timeLeft;
  if(timeLeft<=0){
    playing=false;
    overlay.style.display="flex";
  }
},1000);
</script>

</body>
</html>
