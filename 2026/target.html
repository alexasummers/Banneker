<!DOCTYPE html>
<html>
<head>
  <title>Click the Monster!</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #gameArea {
      width: 400px;
      height: 300px;
      border: 3px solid black;
      margin: 20px auto;
      position: relative;
      background: #e0f7ff;
    }

    .monster {
      width: 80px;
      height: 80px;
      background: purple;
      border-radius: 50%;
      position: absolute;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>🎯 Click the Target!</h2>

Difficulty:
<select id="difficulty">
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard">Hard</option>
</select>

<p>Score: <span id="score">0</span></p>

<div id="gameArea"></div>

<script>
  const gameArea = document.getElementById("gameArea");
  const scoreDisplay = document.getElementById("score");
  const difficultySelect = document.getElementById("difficulty");

  let score = 0;
  let monster;
  let timer;

  function spawnMonster() {
    if (monster) monster.remove();

    monster = document.createElement("div");
    monster.className = "monster";

    let speed = 1500;
    let size = 80;

    if (difficultySelect.value === "medium") {
      speed = 1000;
      size = 60;
    } else if (difficultySelect.value === "hard") {
      speed = 600;
      size = 40;
    }

    monster.style.width = size + "px";
    monster.style.height = size + "px";

    monster.style.left = Math.random() * (400 - size) + "px";
    monster.style.top = Math.random() * (300 - size) + "px";

    monster.onclick = () => {
      score++;
      scoreDisplay.textContent = score;
      spawnMonster();
    };

    gameArea.appendChild(monster);

    clearTimeout(timer);
    timer = setTimeout(spawnMonster, speed);
  }

  spawnMonster();
</script>

</body>
</html>
