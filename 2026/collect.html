<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Collect the Stars!</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #eef6ff;
  }

  #game {
    width: 400px;
    height: 300px;
    border: 3px solid black;
    margin: 20px auto;
    position: relative;
    background: white;
  }

  #player {
    width: 40px;
    height: 40px;
    background: blue;
    position: absolute;
    left: 180px;
    top: 130px;
  }

  .star {
    width: 30px;
    height: 30px;
    background: gold;
    border-radius: 50%;
    position: absolute;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: none;
    background: rgba(0,0,0,.6);
    color: white;
    font-size: 26px;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>

<h2>⭐ Collect the Stars!</h2>

Difficulty:
<select id="difficulty">
  <option value="easy">Easy</option>
  <option value="medium" selected>Medium</option>
  <option value="hard">Hard</option>
</select>

<p>
Score: <span id="score">0</span> |
Time: <span id="time">30</span>
</p>

<div id="game">
  <div id="player"></div>
  <div id="overlay">Time’s Up!</div>
</div>

<script>

const player = document.getElementById("player");
const overlay = document.getElementById("overlay");
const scoreSpan = document.getElementById("score");
const timeSpan = document.getElementById("time");
const difficultySelect = document.getElementById("difficulty");

let score = 0;
let timeLeft = 30;
