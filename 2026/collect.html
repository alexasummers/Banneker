
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Collect the Stars!</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #eef6ff;
  }

  #game {
    width: 400px;
    height: 300px;
    border: 3px solid black;
    margin: 20px auto;
    position: relative;
    background: white;
  }

  #player {
    width: 40px;
    height: 40px;
    background: blue;
    position: absolute;
    left: 180px;
    top: 130px;
  }

  .star {
    width: 30px;
    height: 30px;
    background: gold;
    border-radius: 50%;
    position: absolute;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: none;
    background: rgba(0,0,0,.6);
    color: white;
    font-size: 26px;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>

<h2>⭐ Collect the Stars!</h2>

Difficulty:
<select id="difficulty">
  <option value="easy">Easy</option>
  <option value="medium" selected>Medium</option>
  <option value="hard">Hard</option>
</select>

<p>
Score: <span id="score">0</span> |
Time: <span id="time">30</span>
</p>

<div id="game">
  <div id="player"></div>
  <div id="overlay">Time’s Up!</div>
</div>

<script>
const game = document.getElementById("game");
const player = document.getElementById("player");
const overlay = document.getElementById("overlay");
const scoreSpan = document.getElementById("score");
const timeSpan = document.getElementById("time");
const difficultySelect = document.getElementById("difficulty");

let x = 180, y = 130;
let score = 0;
let timeLeft = 30;
let speed = 5;
let starCount = 5;
let playing = true;

/* ----- DIFFICULTY SETUP ----- */
function applyDifficulty() {
  const diff = difficultySelect.value;

  if (diff === "easy") {
    speed = 3;
    timeLeft = 40;
    starCount = 4;
  } else if (diff === "medium") {
    speed = 5;
    timeLeft = 30;
    starCount = 6;
  } else {
    speed = 7;
    timeLeft = 20;
    starCount = 8;
  }

  timeSpan.textContent = timeLeft;
}

/* ----- STARS ----- */
function spawnStar() {
  const star = document.createElement("div");
  star.className = "star";
  star.style.left = Math.random() * 370 + "px";
  star.style.top = Math.random() * 270 + "px";
  game.appendChild(star);
}

function setupStars() {
  document.querySelectorAll(".star").forEach(s => s.remove());
  for (let i = 0; i < starCount; i++) spawnStar();
}

/* ----- MOVEMENT ----- */
document.addEventListener("keydown", e => {
  if (!playing) return;

  if (e.key === "ArrowUp") y -= speed;
  if (e.key === "ArrowDown") y += speed;
  if (e.key === "ArrowLeft") x -= speed;
  if (e.key === "ArrowRight") x += speed;

  x = Math.max(0, Math.min(360, x));
  y = Math.max(0, Math.min(260, y));

  player.style.left = x + "px";
  player.style.top = y + "px";

  checkCollisions();
});

/* ----- COLLISION ----- */
function checkCollisions() {
  document.querySelectorAll(".star").forEach(star => {
    if (
      x < star.offsetLeft + 30 &&
      x + 40 > star.offsetLeft &&
      y < star.offsetTop + 30 &&
      y + 40 > star.offsetTop
    ) {
      star.remove();
      score++;
      scoreSpan.textContent = score;
      spawnStar();
    }
  });
}

/* ----- TIMER ----- */
setInterval(() => {
  if (!playing) return;
  timeLeft--;
  timeSpan.textContent = timeLeft;

  if (timeLeft <= 0) {
    playing = false;
    overlay.style.display = "flex";
  }
}, 1000);

/* ----- START GAME ----- */
applyDifficulty();
setupStars();
</script>

</body>
</html>
