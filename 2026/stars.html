<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catch the Stars!</title>

<style>
  body { font-family: Arial; text-align: center; background: black; color:white;}
  #game {
    width: 400px; height: 300px;
    border: 3px solid white;
    margin: 20px auto;
    position: relative;
    background: black;
  }
  .star {
    width: 30px; height: 30px;
    background: gold;
    border-radius: 50%;
    position: absolute;
    cursor:pointer;
  }
  #overlay {
    position:absolute; inset:0;
    background: rgba(0,0,0,.7);
    display:none;
    align-items:center;
    justify-content:center;
    font-size:26px;
  }
</style>
</head>
<body>

<h2>🌠 Catch the Falling Stars</h2>

<p>Score: <span id="score">0</span> | Time: <span id="time">20</span></p>

<div id="game">
  <div id="overlay">Time’s Up!</div>
</div>

<script>
const game=document.getElementById("game");
const scoreSpan=document.getElementById("score");
const timeSpan=document.getElementById("time");
const overlay=document.getElementById("overlay");

let score=0, timeLeft=20, playing=true;

function star() {
  if(!playing) return;

  const s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*370+"px";
  s.style.top="0px";

  const fall=setInterval(()=>{
    s.style.top=s.offsetTop+4+"px";
    if(s.offsetTop>300){
      clearInterval(fall);
      s.remove();
    }
  },30);

  s.onclick=()=>{
    score++;
    scoreSpan.textContent=score;
    clearInterval(fall);
    s.remove();
  };

  game.appendChild(s);
}

setInterval(star,800);

setInterval(()=>{
  timeLeft--;
  timeSpan.textContent=timeLeft;
  if(timeLeft<=0){
    playing=false;
    overlay.style.display="flex";
  }
},1000);
</script>

</body>
</html>
